name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    if: >-
      github.event.pull_request
      && (
        contains(join(github.event.pull_request.labels.*.name, ','), '') ||
        true
      )
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Check for Swift changes
        id: filter
        run: |
          CHANGED=$(gh pr diff ${{ github.event.pull_request.number }} --name-only --repo ${{ github.repository }})
          if echo "$CHANGED" | grep -qE '\.(swift)$|^Package\.swift$'; then
            echo "swift=true" >> "$GITHUB_OUTPUT"
          else
            echo "swift=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        if: steps.filter.outputs.swift == 'true'
        run: swift build -c release
