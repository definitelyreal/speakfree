<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect width="120" height="120" rx="26" fill="#111"/>
  <!-- Dissolving waveform: bars fade from solid to invisible left→right -->
  <g transform="translate(60,60)">
    <rect x="-48" y="-12" width="10" height="24" rx="4" fill="#fff" opacity="1.0"/>
    <rect x="-30" y="-22" width="10" height="44" rx="4" fill="#fff" opacity="0.78"/>
    <rect x="-10" y="-32" width="10" height="64" rx="4" fill="#fff" opacity="0.52"/>
    <rect x="8"   y="-22" width="10" height="44" rx="4" fill="#fff" opacity="0.28"/>
    <rect x="26"  y="-12" width="10" height="24" rx="4" fill="#fff" opacity="0.10"/>
  </g>
</svg>
